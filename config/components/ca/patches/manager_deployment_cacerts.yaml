- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: "olmv1-certificate"
    secret:
      secretName: "catalogd-service-cert-git-version"
      optional: false
      items:
        - key: "ca.crt"
          path: "olm-ca.crt"
        - key: "tls.crt"
          path: "olm-tls.crt"
        - key: "tls.key"
          path: "olm-tls.key"
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: "olmv1-certificate"
    readOnly: true
    mountPath: "/var/ca-certs/"
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: "--ca-certs-dir=/var/ca-certs"
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: "--tls-cert=/var/ca-certs/olm-tls.crt"
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: "--tls-key=/var/ca-certs/olm-tls.key"
